name: E2E Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'apps/app/**'
      - 'packages/e2e/**'
      - 'packages/auth/**'
      - 'packages/ui/**'

jobs:
  e2e-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest
    
    - name: Install dependencies
      run: bun install
    
    - name: Install Playwright Browsers
      run: |
        cd packages/e2e
        bun run install
    
    - name: Build application
      run: bun run build
      env:
        NODE_ENV: production
    
    - name: Run E2E tests
      run: bun run test:e2e
      env:
        BASE_URL: http://localhost:3000
        CI: true
    
    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: packages/e2e/playwright-report/
        retention-days: 30
    
    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: packages/e2e/test-results/
        retention-days: 30

  auth-tests:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest
    
    - name: Install dependencies
      run: bun install
    
    - name: Install Playwright Browsers
      run: |
        cd packages/e2e
        bun run install
    
    - name: Build application
      run: bun run build
      env:
        NODE_ENV: production
    
    - name: Run Auth E2E tests
      run: bun run test:e2e:auth
      env:
        BASE_URL: http://localhost:3000
        CI: true
    
    - name: Upload Auth Test Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: auth-test-report
        path: packages/e2e/playwright-report/
        retention-days: 30