name: Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun typecheck

      - name: Run unit tests
        run: bun test --path-ignore-patterns='**/packages/e2e/**'

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: |
            **/test-results/
            **/coverage/
          retention-days: 7

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bun --filter @calls/e2e install

      - name: Build applications
        run: bun run build

      - name: Setup database
        run: |
          echo "POSTGRES_URL=postgresql://postgres:postgres@localhost:5432/test_db" >> .env.local
          echo "NEXT_PUBLIC_API_URL=http://localhost:3000" >> .env.local
          echo "NEXT_PUBLIC_BETTER_AUTH_URL=http://localhost:3000" >> .env.local
          echo "NODE_ENV=test" >> .env.local
          bunx turbo -F `@calls/db` db:push:ci

      - name: Start application
        run: |
          bun run dev:next &
          sleep 10

      - name: Wait for application to be ready
        run: |
          timeout 60 bash -c 'until curl -f http://localhost:3000/auth/signin; do sleep 2; done'

      - name: Run E2E tests
        run: bun run test:e2e
        env:
          CI: true
          BASE_URL: http://localhost:3000
          POSTGRES_URL: postgresql://postgres:postgres@localhost:5432/test_db

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            packages/e2e/test-results/
            packages/e2e/playwright-report/
          retention-days: 7

  e2e-auth-tests:
    name: E2E Auth Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bun --filter @calls/e2e install

      - name: Build applications
        run: bun run build

      - name: Setup database
        run: |
          echo "POSTGRES_URL=postgresql://postgres:postgres@localhost:5432/test_db" >> .env.local
          echo "NEXT_PUBLIC_API_URL=http://localhost:3000" >> .env.local
          echo "NEXT_PUBLIC_BETTER_AUTH_URL=http://localhost:3000" >> .env.local
          echo "NODE_ENV=test" >> .env.local
          turbo -F @calls/db db:push:ci

      - name: Start application
        run: |
          bun run dev:next &
          sleep 10

      - name: Wait for application to be ready
        run: |
          timeout 60 bash -c 'until curl -f http://localhost:3000/auth/signin; do sleep 2; done'

      - name: Run E2E auth tests
        run: bun run test:e2e:auth
        env:
          CI: true
          BASE_URL: http://localhost:3000
          POSTGRES_URL: postgresql://postgres:postgres@localhost:5432/test_db

      - name: Upload E2E auth test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-auth-test-results
          path: |
            packages/e2e/test-results/
            packages/e2e/playwright-report/
          retention-days: 7
