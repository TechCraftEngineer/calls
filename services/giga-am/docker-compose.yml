services:
  giga-am:
    build:
      context: .
      dockerfile: Dockerfile.simple
      args:
        GIGAAM_REV: ${GIGAAM_REV:-}
    container_name: giga-am-api
    ports:
      - "7860:7860"
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - LOG_LEVEL=INFO
    volumes:
      # Логи приложения на хосте
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
