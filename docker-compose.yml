version: "3"
volumes:
  minio:
  postgres:
services:
  inbucket:
    restart: always
    image: inbucket/inbucket:latest
    container_name: inbucket
    ports:
      - 9000:9000
      - 2500:2500
      - 1100:1100
    environment:
      - INBUCKET_WEB_ADDR=0.0.0.0:9000
      - INBUCKET_SMTP_ADDR=0.0.0.0:2500
      - INBUCKET_POP3_ADDR=0.0.0.0:1100
  minio:
    restart: always
    image: minio/minio
    container_name: minio
    ports:
      - 9002:9002
      - 9001:9001
    volumes:
      - minio:/data
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: password
    entrypoint: sh
    command: -c 'mkdir -p /data/minio && minio server /data --console-address ":9001" --address ":9002"'
  create-buckets:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc config host add minio http://minio:9002 minio password;
      /usr/bin/mc rb minio/files.acme.com;
      /usr/bin/mc mb minio/files.acme.com;
      /usr/bin/mc anonymous set public minio/files.acme.com;
      exit 0;
      "
  postgres:
    restart: always
    image: postgres:18-alpine
    container_name: postgres
    ports:
      - 5432:5432
    volumes:
      - postgres:/var/lib/postgresql/data
      - ./packages/db/drizzle:/app/migrations
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: acme
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Run database migrations
  migrate:
    build:
      context: .
      dockerfile: packages/db/Dockerfile
    container_name: migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_URL: postgres://postgres:password@postgres:5432/acme
    command: ["bun", "run", "db:migrate"]

  # New backend server (TypeScript + Hono + oRPC)
  backend-server:
    build:
      context: .
      dockerfile: apps/backend-server/Dockerfile
    container_name: backend-server
    restart: always
    ports:
      - 8000:8000
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      POSTGRES_URL: postgres://postgres:password@postgres:5432/acme
      BACKEND_PORT: 8000
      CORS_ORIGINS: http://localhost:3000
      DEPLOYMENT_ENV: docker
      AWS_S3_ENDPOINT: http://minio:9002
      AWS_S3_FORCE_PATH_STYLE: "true"
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: password
      AWS_S3_BUCKET: files.acme.com
    volumes:
      - ./apps/backend/data:/app/data
      - ./records:/app/records
      - ./logs:/app/logs

  # Inngest jobs worker (Megafon FTP sync и др.)
  jobs:
    build:
      context: .
      dockerfile: packages/jobs/Dockerfile
    container_name: jobs
    restart: always
    ports:
      - 8001:8000
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      audio-enhancer:
        condition: service_started
    environment:
      POSTGRES_URL: postgres://postgres:password@postgres:5432/acme
      JOBS_PORT: 8000
      DEPLOYMENT_ENV: docker
      AWS_S3_ENDPOINT: http://minio:9002
      AWS_S3_FORCE_PATH_STYLE: "true"
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: password
      AWS_S3_BUCKET: files.acme.com
      MEGAFON_FTP_HOST: ${MEGAFON_FTP_HOST:-}
      MEGAFON_FTP_USER: ${MEGAFON_FTP_USER:-}
      MEGAFON_FTP_PASSWORD: ${MEGAFON_FTP_PASSWORD:-}
      AUDIO_ENHANCER_URL: http://audio-enhancer:8080
    volumes:
      - ./records:/app/records

  # Python микросервис для продвинутой обработки аудио
  audio-enhancer:
    build:
      context: ./services/audio-enhancer
      dockerfile: Dockerfile
    container_name: audio-enhancer
    restart: always
    environment:
      LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

